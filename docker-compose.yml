version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: store_rating_backend
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: 5000
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ""
      DB_NAME: store_rating_db
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      JWT_EXPIRES: 7d
      FRONTEND_URL: http://localhost:5173
